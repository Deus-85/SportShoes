/* SELECTION DE LA POINTURE */

let boutonsTailles = document.querySelectorAll(".tailles button");

let tailleSelectionnee = "";

boutonsTailles.forEach(function(bouton){

    bouton.addEventListener("click",function(){

        boutonsTailles.forEach(function(btn){

            btn.classList.remove("active");

        });

        bouton.classList.add("active");

        tailleSelectionnee = bouton.textContent;

    });

});

/* AJOUTER AU PANIER */

let bouton = document.getElementById("ajouter-panier");

bouton.addEventListener("click",function(){

    if(tailleSelectionnee==""){

        alert("Veuillez choisir une pointure.");

        return;

    }

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({

        name: product.name,
        price: product.price,
        image: product.image,
        taille: tailleSelectionnee

    });

    localStorage.setItem("panier",JSON.stringify(panier));

    alert("Produit ajouté au panier.");

});
