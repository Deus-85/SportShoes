<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SportShoes</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* PAGE CONTACT */
.contact-section {
  min-height: 80vh;
  padding: 70px 20px;
  background-color: #f5f6fa;
}

.contact-card {
  max-width: 650px;
  margin: auto;
  padding: 35px;
  border-radius: 16px;
  background-color: white;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
}

.contact-card h2 {
  margin-top: 0;
  font-size: 32px;
  color: #111827;
}

.contact-card p {
  margin-bottom: 28px;
  color: #667085;
}

.contact-card label {
  display: block;
  margin-bottom: 7px;
  font-weight: bold;
  color: #344054;
}

.contact-card input,
.contact-card textarea {
  width: 100%;
  margin-bottom: 20px;
  padding: 13px;
  border: 1px solid #d0d5dd;
  border-radius: 8px;
  font-family: Arial, sans-serif;
  font-size: 16px;
  box-sizing: border-box;
}

.contact-card textarea {
  height: 140px;
  resize: vertical;
}

.contact-card input:focus,
.contact-card textarea:focus {
  outline: none;
  border-color: #ff7a00;
  box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.15);
}

.contact-card button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background-color: #ff7a00;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.contact-card button:hover {
  background-color: #d85f00;
}

@media (max-width: 700px) {
  .contact-section {
    padding: 40px 15px;
  }

  .contact-card {
    padding: 25px 20px;
  }
}
    </style>
</head>
<body>
       <header>
  <h1>SportShoes</h1>

  <nav>
    <a href="acceuil.html">Accueil</a>
    <a href="boutique.html">Boutique</a>
    <a href="contact.html">Contact</a>
    <a href="panier.html">Panier</a>
  </nav>
</header>
</body>
<main class="contact-section">
  <div class="contact-card">
    <h2>Contactez-nous</h2>
    <p>Une question sur une chaussure ? Écrivez-nous.</p>

    <form>
      <label for="nom">Nom complet</label>
      <input id="nom" type="text" placeholder="Votre nom">

      <label for="email">Adresse e-mail</label>
      <input id="email" type="email" placeholder="exemple@email.com">

      <label for="message">Message</label>
      <textarea id="message" placeholder="Écrivez votre message"></textarea>

      <button type="submit">Envoyer le message</button>
    </form>
  </div>
</main>
<footer class="site-footer">
  <div class="container footer-row">
      <p>© 2026 SportShoes</p>
      <p>Projet de fin d’année — L1 Informatique</p>
  </div>
</footer>
</html>
