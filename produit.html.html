    <link rel="stylesheet" href="style.css">

    
    <style>
        body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#f5f5f5;       
        }
        header {
          background: #101828;
          font-family: Arial, Helvetica, sans-serif;
          color: white;
          padding: 15px 7%;
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
          margin: 5px;
          color: #ff7a00;
          font-family: Arial, Helvetica, sans-serif;
        }
        nav a {
          color: white;
          text-decoration: none;
          margin-left: 18px;
        }

        nav a:hover {
          color: #ff7a00;
        }

        .Produit{
            display: flex;
            align-items: flex-start;
            justify-content: left;
            gap: 70px;
            width: 90%;
            margin: 60px auto;
            border-radius: 400px;
        }

        .info{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            max-width: 450px;
        }

        .tailles button{
            width: 40px;
            height: 40px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.03;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .tailles button:hover{
            background:#ff7a1a;
            color:white;
        }

        .tailles button.active{
            background:#23253d;
            color:white;
            border:none;
        }

        .bouton-panier{
            margin-top: 15px;
            border-radius: 20px;
            width: 200px;
            height: 40px;
            background: #ff7539;
            color: #f5f5f5;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .bouton-panier:hover{
            background: #ff600beb;
            transition: 0.1s;
            transform: scale(1.05);
        }

        .price {
            font-weight: 900;
            font-size: xx-large;
            margin-top: -10px;
            margin-bottom: 0px;
            color: #fe711ff2;
        }


        .site-footer{
           bottom: 0px;
            width: 100%;
            background: #101828;
            color: #f5f5f5;
            padding: 0px;
            margin-top: 30px;
        
        }

        .footer-row{
            display: flex;
            justify-content: space-between;
            gap: 15px;
            font-size: .9rem;
            margin: 30px;

        }




        @media (max-width: 700px) {
            .Produit{
            flex-direction: column;
            text-align: center;
            gap: 40px;
        
            }
            .info{
            max-width: 100%;
            }

            .tailles{
                justify-content: center;
            }

            .produit-image{
                max-width: 90%;
            }
        }
    </style>
</head>

/* SELECTION DE LA POINTURE */

let boutonsTailles = document.querySelectorAll(".tailles button");

let tailleSelectionnee = "";

boutonsTailles.forEach(function(bouton){

    bouton.addEventListener("click",function(){

        boutonsTailles.forEach(function(btn){

            btn.classList.remove("active");

        });

        bouton.classList.add("active");

        tailleSelectionnee = bouton.textContent;

    });

});

/* AJOUTER AU PANIER */

let bouton = document.getElementById("ajouter-panier");

bouton.addEventListener("click",function(){

    if(tailleSelectionnee==""){

        alert("Veuillez choisir une pointure.");

        return;

    }

    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    panier.push({

        name: product.name,
        price: product.price,
        image: product.image,
        taille: tailleSelectionnee

    });

    localStorage.setItem("panier",JSON.stringify(panier));

    alert("Produit ajouté au panier.");

});
